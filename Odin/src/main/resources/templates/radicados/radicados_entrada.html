<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Radicación de Entrada</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
          rel="stylesheet">

    <link rel="stylesheet" th:href="@{/css/style.css}">

    <style>
        body {
            font-family: 'Inter', sans-serif;
        }
    </style>
</head>

<body class="bg-[#f5f6f8] text-slate-800">

<div class="min-h-screen flex">

    <!-- SIDEBAR -->
    <div th:replace="fragments/layout :: sidebar('radicados')"></div>

    <!-- CONTENIDO -->
    <div class="flex-1 min-w-0">

        <!-- TOPBAR -->
        <div th:replace="fragments/layout :: topbar('ODIN')"></div>

        <!-- MAIN -->
        <main class="px-4 md:px-8 py-6">

            <!-- TITULO -->
            <section class="mb-6">
                <h1 class="text-2xl md:text-3xl font-extrabold uppercase text-slate-900">
                    Radicación de Entrada
                </h1>
                <p class="text-sm text-slate-500 mt-1">
                    Registro de documentos recibidos
                </p>
            </section>

            <!-- BOTONES DE NAVEGACIÓN ENTRE TIPOS DE RADICACIÓN (ARRIBA A LA DERECHA) -->
            <div class="flex justify-end gap-3 mb-6">
                <a th:href="@{/view/radicados/entrada}"
                   class="rounded-lg px-4 py-2 text-sm font-bold
                          bg-[#168500] text-white hover:bg-[#0f6d00] transition">
                    Entrada
                </a>

                <a th:href="@{/view/radicados/salida}"
                   class="rounded-lg px-4 py-2 text-sm font-bold
                          bg-slate-200 text-slate-700 hover:bg-slate-300 transition">
                    Salida
                </a>

                <a th:href="@{/view/radicados/interna}"
                   class="rounded-lg px-4 py-2 text-sm font-bold
                          bg-slate-200 text-slate-700 hover:bg-slate-300 transition">
                    Interna
                </a>

                <a th:href="@{/view/radicados/pqrs}"
                   class="rounded-lg px-4 py-2 text-sm font-bold
                          bg-slate-200 text-slate-700 hover:bg-slate-300 transition">
                    PQRS
                </a>
            </div>

            <!-- FORMULARIO -->
            <form th:action="@{/view/radicados/entrada/save}" th:object="${radicado}" method="post" enctype="multipart/form-data"
                  class="space-y-8">

                <!-- INFORMACIÓN DEL REMITENTE -->
                <section class="rounded-xl border border-slate-200 bg-white shadow-sm p-6">
                    <div class="mb-4 flex flex-col gap-3 sm:flex-row sm:items-center sm:justify-between">
                        <h2 class="text-lg font-bold text-slate-900">Información del Remitente</h2>

                        <button type="button" id="modoAnonimoBtn" aria-pressed="false"
                                class="rounded-lg border border-slate-300 bg-white px-4 py-2 text-sm font-bold text-slate-700 hover:bg-slate-50 transition">
                            Radicado anónimo
                        </button>
                    </div>

                    <input type="hidden" id="remitenteAnonimo" name="remitente" value="Anónimo" disabled>

                    <div id="camposInformacionPersonal" class="grid md:grid-cols-2 gap-6">
                        <div>
                            <label class="block text-sm font-medium text-slate-700">Nombre / Razón Social</label>
                            <input type="text" th:field="*{remitente}" data-campo-personal class="input w-full mt-1"/>
                        </div>

                        <div>
                            <label class="block text-sm font-medium text-slate-700">Número de Identificación</label>
                            <input type="text" th:field="*{numeroIdentificacion}" data-campo-personal class="input w-full mt-1"/>
                        </div>

                        <div>
                            <label class="block text-sm font-medium text-slate-700">Contacto</label>
                            <input type="text" th:field="*{contacto}" data-campo-personal class="input w-full mt-1"/>
                        </div>

                        <div>
                            <label class="block text-sm font-medium text-slate-700">Dirección</label>
                            <input type="text" th:field="*{direccion}" data-campo-personal class="input w-full mt-1"/>
                        </div>
                    </div>
                </section>

                <!-- DETALLES DEL DOCUMENTO -->
                <section class="rounded-xl border border-slate-200 bg-white shadow-sm p-6">
                    <h2 class="text-lg font-bold text-slate-900 mb-4">Detalles del Documento</h2>

                    <div class="grid md:grid-cols-2 gap-6">
                        <div>
                            <label class="block text-sm font-medium text-slate-700">Asunto / Referencia</label>
                            <input type="text" th:field="*{asunto}" class="input w-full mt-1"/>
                        </div>

                        <div>
                            <label class="block text-sm font-medium text-slate-700">Tipo de Documento</label>
                            <select th:field="*{tipoDocumento}" class="input w-full mt-1">
                                <option value="">Seleccione...</option>
                                <option value="Oficio">Oficio</option>
                                <option value="Carta">Carta</option>
                                <option value="Informe">Informe</option>
                            </select>
                        </div>

                        <div>
                            <label class="block text-sm font-medium text-slate-700">Fecha del Documento</label>
                            <input type="date" th:field="*{fechaDocumento}" class="input w-full mt-1"/>
                        </div>

                        <div>
                            <label class="block text-sm font-medium text-slate-700">Canal de Recepción</label>
                            <select th:field="*{canalRecepcion}" class="input w-full mt-1">
                                <option value="">Seleccione...</option>
                                <option value="Correo">Correo</option>
                                <option value="Presencial">Presencial</option>
                                <option value="Mensajería">Mensajería</option>
                            </select>
                        </div>

                        <div class="md:col-span-2">
                            <label class="block text-sm font-medium text-slate-700">Dependencia Asignada</label>
                            <select th:field="*{dependencia}" class="input w-full mt-1">
                                <option value="">Seleccione...</option>
                                <option value="Dirección">Dirección</option>
                                <option value="Recursos Humanos">Recursos Humanos</option>
                                <option value="Financiera">Financiera</option>
                            </select>
                        </div>
                    </div>
                </section>

                <!-- ARCHIVOS ADJUNTOS -->
                <section class="rounded-xl border border-slate-200 bg-white shadow-sm p-6">
                    <h2 class="text-lg font-bold text-slate-900 mb-4">Archivos Adjuntos</h2>

                    <div>
                        <input type="file" th:field="*{archivos}" multiple class="input w-full"/>
                        <p class="text-xs text-slate-500 mt-2">Formatos permitidos: PDF, DOCX, JPG, PNG</p>
                    </div>
                </section>

                <!-- BOTONES -->
                <div class="flex justify-end gap-4">
                    <button type="reset"
                            class="rounded-lg bg-slate-200 px-6 py-2.5 text-sm font-bold text-slate-700 hover:bg-slate-300 transition">
                        Limpiar Formulario
                    </button>

                    <button type="submit"
                            class="rounded-lg bg-[#168500] px-6 py-2.5 text-sm font-bold text-white hover:bg-[#0f6d00] transition">
                        Radicar Documento
                    </button>
                </div>

            </form>

        </main>
    </div>
</div>

<script>
    document.addEventListener('DOMContentLoaded', function () {
        const botonAnonimo = document.getElementById('modoAnonimoBtn');
        const remitenteAnonimo = document.getElementById('remitenteAnonimo');
        const contenedorCampos = document.getElementById('camposInformacionPersonal');
        const camposPersonales = document.querySelectorAll('[data-campo-personal]');
        const formulario = botonAnonimo.closest('form');

        function activarModoAnonimo(activo) {
            botonAnonimo.setAttribute('aria-pressed', String(activo));
            botonAnonimo.textContent = activo ? 'Radicado identificado' : 'Radicado anónimo';
            botonAnonimo.classList.toggle('bg-[#168500]', activo);
            botonAnonimo.classList.toggle('text-white', activo);
            botonAnonimo.classList.toggle('border-[#168500]', activo);
            botonAnonimo.classList.toggle('bg-white', !activo);
            botonAnonimo.classList.toggle('text-slate-700', !activo);
            botonAnonimo.classList.toggle('border-slate-300', !activo);
            remitenteAnonimo.disabled = !activo;
            contenedorCampos.classList.toggle('opacity-50', activo);

            camposPersonales.forEach(function (campo) {
                campo.disabled = activo;
                if (activo) {
                    campo.value = '';
                }
            });
        }

        botonAnonimo.addEventListener('click', function () {
            activarModoAnonimo(botonAnonimo.getAttribute('aria-pressed') !== 'true');
        });

        formulario.addEventListener('reset', function () {
            setTimeout(function () {
                activarModoAnonimo(false);
            }, 0);
        });
    });
</script>

</body>
</html>
