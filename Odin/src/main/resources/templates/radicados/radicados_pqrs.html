<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Módulo PQRS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }
    </style>
</head>
<body class="bg-[#f5f6f8] text-slate-800">

<div class="min-h-screen flex">
    <div th:replace="fragments/layout :: sidebar('radicados')"></div>

    <div class="flex-1 min-w-0">
        <div th:replace="fragments/layout :: topbar('PQRS')"></div>

        <main class="px-4 md:px-8 py-6">
            <section class="mb-6">
                <h1 class="text-2xl md:text-3xl font-extrabold uppercase text-slate-900">
                    Módulo PQRS
                </h1>
                <p class="text-sm text-slate-500 mt-1">
                    Registro de peticiones, quejas, reclamos y sugerencias
                </p>
            </section>

            <div class="flex flex-wrap justify-end gap-3 mb-6">
                <a th:href="@{/view/radicados/entrada}"
                   class="rounded-lg bg-slate-200 px-4 py-2 text-sm font-bold text-slate-700 hover:bg-slate-300 transition">
                    Entrada
                </a>
                <a th:href="@{/view/radicados/salida}"
                   class="rounded-lg bg-slate-200 px-4 py-2 text-sm font-bold text-slate-700 hover:bg-slate-300 transition">
                    Salida
                </a>
                <a th:href="@{/view/radicados/interna}"
                   class="rounded-lg bg-slate-200 px-4 py-2 text-sm font-bold text-slate-700 hover:bg-slate-300 transition">
                    Interna
                </a>
                <a th:href="@{/view/radicados/pqrs}"
                   class="rounded-lg bg-[#168500] px-4 py-2 text-sm font-bold text-white hover:bg-[#0f6d00] transition">
                    PQRS
                </a>
            </div>

            <form th:action="@{/view/radicados/pqrs/save}" th:object="${radicado}" method="post" enctype="multipart/form-data"
                  class="space-y-8">
                <input type="hidden" name="tipoDocumento" value="PQRS">

                <section class="rounded-xl border border-slate-200 bg-white shadow-sm p-6">
                    <h2 class="mb-4 text-lg font-bold text-slate-900">Tipo de Solicitud</h2>

                    <div class="grid gap-3 sm:grid-cols-2 lg:grid-cols-4">
                        <label class="flex items-center gap-3 rounded-lg border border-slate-200 bg-white px-4 py-3 text-sm font-bold text-slate-700">
                            <input type="radio" th:field="*{tipoPQRS}" value="Petición" checked>
                            Petición
                        </label>
                        <label class="flex items-center gap-3 rounded-lg border border-slate-200 bg-white px-4 py-3 text-sm font-bold text-slate-700">
                            <input type="radio" th:field="*{tipoPQRS}" value="Queja">
                            Queja
                        </label>
                        <label class="flex items-center gap-3 rounded-lg border border-slate-200 bg-white px-4 py-3 text-sm font-bold text-slate-700">
                            <input type="radio" th:field="*{tipoPQRS}" value="Reclamo">
                            Reclamo
                        </label>
                        <label class="flex items-center gap-3 rounded-lg border border-slate-200 bg-white px-4 py-3 text-sm font-bold text-slate-700">
                            <input type="radio" th:field="*{tipoPQRS}" value="Sugerencia">
                            Sugerencia
                        </label>
                    </div>
                </section>

                <section class="rounded-xl border border-slate-200 bg-white shadow-sm p-6">
                    <h2 class="mb-4 text-lg font-bold text-slate-900">Información del Remitente</h2>

                    <div class="grid md:grid-cols-2 gap-6">
                        <div>
                            <label class="block text-sm font-medium text-slate-700">Nombre / Razón Social</label>
                            <input type="text" th:field="*{remitente}" class="input w-full mt-1">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-slate-700">Número de Identificación</label>
                            <input type="text" th:field="*{numeroIdentificacion}" class="input w-full mt-1">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-slate-700">Contacto</label>
                            <input type="text" th:field="*{contacto}" class="input w-full mt-1">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-slate-700">Dirección</label>
                            <input type="text" th:field="*{direccion}" class="input w-full mt-1">
                        </div>
                    </div>
                </section>

                <section class="rounded-xl border border-slate-200 bg-white shadow-sm p-6">
                    <h2 class="mb-4 text-lg font-bold text-slate-900">Detalles de la Solicitud</h2>

                    <div class="grid md:grid-cols-2 gap-6">
                        <div class="md:col-span-2">
                            <label class="block text-sm font-medium text-slate-700">Asunto / Referencia</label>
                            <input type="text" th:field="*{asunto}" class="input w-full mt-1">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-slate-700">Fecha del Documento</label>
                            <input type="date" th:field="*{fechaDocumento}" class="input w-full mt-1">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-slate-700">Dependencia Asignada</label>
                            <select th:field="*{dependencia}" class="input w-full mt-1">
                                <option value="">Seleccione...</option>
                                <option value="Dirección">Dirección</option>
                                <option value="Recursos Humanos">Recursos Humanos</option>
                                <option value="Financiera">Financiera</option>
                            </select>
                        </div>
                    </div>
                </section>

                <section class="rounded-xl border border-slate-200 bg-white shadow-sm p-6">
                    <h2 class="mb-4 text-lg font-bold text-slate-900">Archivos Adjuntos</h2>
                    <input type="file" th:field="*{archivos}" multiple class="input w-full">
                </section>

                <div class="flex justify-end gap-4">
                    <button type="reset"
                            class="rounded-lg bg-slate-200 px-6 py-2.5 text-sm font-bold text-slate-700 hover:bg-slate-300 transition">
                        Limpiar Formulario
                    </button>
                    <button type="submit"
                            class="rounded-lg bg-[#168500] px-6 py-2.5 text-sm font-bold text-white hover:bg-[#0f6d00] transition">
                        Radicar Documento
                    </button>
                </div>
            </form>
        </main>
    </div>
</div>

</body>
</html>
