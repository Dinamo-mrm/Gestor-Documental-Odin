<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Radicación Interna</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }
    </style>
</head>
<body class="bg-[#f5f6f8] text-slate-800">

<div class="min-h-screen flex">
    <div th:replace="fragments/layout :: sidebar('radicados')"></div>

    <div class="flex-1 min-w-0">
        <div th:replace="fragments/layout :: topbar('ODIN')"></div>

        <main class="px-4 md:px-8 py-6">
            <section class="mb-6">
                <h1 class="text-2xl md:text-3xl font-extrabold uppercase text-slate-900">
                    Radicación Interna
                </h1>
                <p class="text-sm text-slate-500 mt-1">
                    Movimiento de documentos entre dependencias
                </p>
            </section>

            <div class="flex flex-wrap justify-end gap-3 mb-6">
                <a th:href="@{/view/radicados/entrada}"
                   class="rounded-lg bg-slate-200 px-4 py-2 text-sm font-bold text-slate-700 hover:bg-slate-300 transition">
                    Entrada
                </a>
                <a th:href="@{/view/radicados/salida}"
                   class="rounded-lg bg-slate-200 px-4 py-2 text-sm font-bold text-slate-700 hover:bg-slate-300 transition">
                    Salida
                </a>
                <a th:href="@{/view/radicados/interna}"
                   class="rounded-lg bg-[#168500] px-4 py-2 text-sm font-bold text-white hover:bg-[#0f6d00] transition">
                    Interna
                </a>
                <a th:href="@{/view/radicados/pqrs}"
                   class="rounded-lg bg-slate-200 px-4 py-2 text-sm font-bold text-slate-700 hover:bg-slate-300 transition">
                    PQRS
                </a>
            </div>

            <form th:action="@{/view/radicados/interna/save}" th:object="${radicado}" method="post" enctype="multipart/form-data"
                  class="space-y-8">
                <input type="hidden" name="tipoDocumento" value="Interno">

                <section class="rounded-xl border border-slate-200 bg-white shadow-sm p-6">
                    <h2 class="mb-4 text-lg font-bold text-slate-900">Flujo Interno</h2>

                    <div class="grid md:grid-cols-2 gap-6">
                        <div>
                            <label class="block text-sm font-medium text-slate-700">Dependencia Origen</label>
                            <input type="text" th:field="*{dependenciaOrigen}" class="input w-full mt-1">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-slate-700">Dependencia Destino</label>
                            <input type="text" th:field="*{dependenciaDestino}" class="input w-full mt-1">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-slate-700">Responsable</label>
                            <input type="text" th:field="*{responsable}" class="input w-full mt-1">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-slate-700">Prioridad</label>
                            <select th:field="*{prioridad}" class="input w-full mt-1">
                                <option value="">Seleccione...</option>
                                <option value="Alta">Alta</option>
                                <option value="Media">Media</option>
                                <option value="Baja">Baja</option>
                            </select>
                        </div>
                        <div class="md:col-span-2">
                            <label class="block text-sm font-medium text-slate-700">Asunto / Referencia</label>
                            <input type="text" th:field="*{asunto}" class="input w-full mt-1">
                        </div>
                        <div class="md:col-span-2">
                            <label class="block text-sm font-medium text-slate-700">Observaciones</label>
                            <textarea th:field="*{observaciones}" rows="4" class="input w-full mt-1"></textarea>
                        </div>
                    </div>
                </section>

                <section class="rounded-xl border border-slate-200 bg-white shadow-sm p-6">
                    <h2 class="mb-4 text-lg font-bold text-slate-900">Carga de Documento</h2>
                    <input type="file" th:field="*{archivos}" multiple class="input w-full">
                </section>

                <div class="flex justify-end gap-4">
                    <button type="reset"
                            class="rounded-lg bg-slate-200 px-6 py-2.5 text-sm font-bold text-slate-700 hover:bg-slate-300 transition">
                        Limpiar Formulario
                    </button>
                    <button type="submit"
                            class="rounded-lg bg-[#168500] px-6 py-2.5 text-sm font-bold text-white hover:bg-[#0f6d00] transition">
                        Radicar Documento
                    </button>
                </div>
            </form>
        </main>
    </div>
</div>

</body>
</html>
