<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario de Trámites</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">

    <style>
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>

<body class="bg-[#f5f6f8] text-slate-800">

<div class="min-h-screen flex">

    <!-- SIDEBAR -->
    <div th:replace="fragments/layout :: sidebar('tramites')"></div>

    <div id="overlay" class="fixed inset-0 bg-black/40 z-20 hidden"></div>

    <div class="flex-1 min-w-0">

        <!-- TOPBAR -->
        <div th:replace="fragments/layout :: topbar('ODIN')"></div>

        <main class="max-w-4xl mx-auto px-4 md:px-8 py-10">

            <!-- ENCABEZADO -->
            <section class="mb-8">
                <h1 class="text-2xl md:text-3xl font-extrabold text-slate-900 uppercase tracking-tight">
                    Registro de Trámite
                </h1>
                <p class="text-sm text-slate-500 mt-1">
                    Complete los campos para crear o editar un trámite en el sistema.
                </p>
            </section>

            <!-- FORMULARIO -->
            <form th:action="@{/view/tramites/save}"
                  th:object="${tramites}"
                  method="post"
                  class="space-y-6">

                <!-- ID OCULTO -->
                <input type="hidden" th:field="*{id_tramite}" />

                <div class="rounded-xl border border-slate-200 bg-white shadow-sm overflow-hidden">

                    <div class="px-6 py-4 border-b border-slate-100 bg-slate-50/50">
                        <h2 class="text-xs font-bold text-slate-500 uppercase tracking-widest flex items-center gap-2">
                            📝 Detalles del Trámite
                        </h2>
                    </div>

                    <div class="p-6 space-y-5">

                        <!-- NOMBRE -->
                        <div>
                            <label class="block text-[11px] font-bold text-slate-500 uppercase mb-1.5 ml-1">
                                Nombre del Trámite
                            </label>
                            <input type="text" th:field="*{nombre}" required
                                   placeholder="Ej: Solicitud de Permiso de Construcción"
                                   class="w-full rounded-lg border border-slate-200 bg-slate-50 px-4 py-3 text-sm outline-none focus:border-green-600 focus:bg-white focus:ring-4 focus:ring-green-50 transition-all">
                        </div>

                        <!-- DESCRIPCIÓN -->
                        <div>
                            <label class="block text-[11px] font-bold text-slate-500 uppercase mb-1.5 ml-1">
                                Descripción
                            </label>
                            <textarea th:field="*{descripcion}" required rows="5"
                                      placeholder="Describa brevemente en qué consiste este trámite..."
                                      class="w-full rounded-lg border border-slate-200 bg-slate-50 px-4 py-3 text-sm outline-none focus:border-green-600 focus:bg-white focus:ring-4 focus:ring-green-50 transition-all"></textarea>
                            <p class="mt-2 text-[11px] text-slate-400 italic">
                                Máximo 255 caracteres permitidos.
                            </p>
                        </div>

                    </div>
                </div>

                <!-- BOTONES DE ACCIÓN -->
                <div class="flex items-center justify-end gap-4 pt-2">
                    <a th:href="@{/view/tramites}"
                       class="px-6 py-2.5 text-sm font-semibold text-slate-600 hover:text-slate-800 transition">
                        Cancelar y volver
                    </a>

                    <button type="submit"
                            class="rounded-lg bg-[#2fa300] px-8 py-2.5 text-sm font-bold text-white shadow-md shadow-green-200 hover:bg-[#248400] hover:-translate-y-0.5 transition-all active:translate-y-0">
                        Guardar Trámite
                    </button>
                </div>

            </form>

        </main>
    </div>
</div>

<script th:src="@{/js/script.js}" defer></script>

</body>
</html>
